<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>东西即兴人格测试</title>
    <style>
        :root {
            --bg: #fdf8f3;
            --card: #ffffff;
            --text: #3d3430;
            --text-light: #6b5e58;
            --accent: #e8813b;
            --accent-soft: #fff5ed;
            --progress-bg: #ede4db;
            --shadow: 0 2px 16px rgba(60, 40, 20, 0.07);
            --shadow-hover: 0 4px 24px rgba(60, 40, 20, 0.12);
            --radius: 16px;
            --radius-sm: 10px;
            --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", "Hiragino Sans GB", sans-serif;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: var(--font-stack);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px 16px 60px;
            line-height: 1.6;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }
        .app-container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            position: relative;
            z-index: 1;
        }
        .header {
            text-align: center;
            padding: 10px 0 0;
            position: relative;
        }
        .lang-switch {
            position: absolute;
            top: 0;
            right: 0;
            background: #fff;
            border: 1.5px solid #ddd;
            border-radius: 30px;
            padding: 6px 14px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            color: #6b5e58;
            transition: all var(--transition);
            z-index: 2;
            box-shadow: 0 2px 6px rgba(0,0,0,0.03);
        }
        .lang-switch:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: #fffaf5;
        }
        .header .brand-icon {
            font-size: 48px;
            display: block;
            margin-bottom: 6px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .header h1 {
            font-size: 1.7rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            color: #3d3430;
            margin: 0;
        }
        .header .subtitle {
            font-size: 0.9rem;
            color: var(--text-light);
            margin-top: 4px;
            letter-spacing: 0.04em;
        }
        .progress-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 4px;
        }
        .progress-bar-outer {
            flex: 1;
            height: 6px;
            background: var(--progress-bg);
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-bar-inner {
            height: 100%;
            background: var(--accent);
            border-radius: 10px;
            transition: width 0.4s ease;
            width: 0%;
        }
        .progress-label {
            font-size: 0.8rem;
            color: var(--text-light);
            font-weight: 500;
            white-space: nowrap;
            min-width: 36px;
            text-align: right;
        }
        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 28px 24px;
            box-shadow: var(--shadow);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            gap: 18px;
            border: 1px solid rgba(0,0,0,0.02);
        }
        .card:hover {
            box-shadow: var(--shadow-hover);
        }
        .section-tag {
            display: inline-block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--accent);
            font-weight: 600;
            background: var(--accent-soft);
            padding: 4px 10px;
            border-radius: 20px;
            align-self: flex-start;
        }
        .question-text {
            font-size: 1.1rem;
            font-weight: 600;
            line-height: 1.6;
            color: var(--text);
            margin: 0;
        }
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .option-btn {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            width: 100%;
            text-align: left;
            padding: 14px 16px;
            border: 2px solid #ede4db;
            border-radius: var(--radius-sm);
            background: #fefcf9;
            cursor: pointer;
            font-size: 0.95rem;
            color: var(--text);
            transition: all var(--transition);
            font-family: var(--font-stack);
            line-height: 1.5;
            -webkit-user-select: none;
            user-select: none;
        }
        .option-btn:hover {
            border-color: var(--accent);
            background: #fffaf5;
            transform: translateX(2px);
        }
        .option-btn:active {
            transform: scale(0.985);
            transition: 0.1s ease;
        }
        .option-btn.selected {
            border-color: var(--accent);
            background: var(--accent-soft);
            box-shadow: 0 0 0 3px rgba(232, 129, 59, 0.08);
        }
        .option-letter {
            flex-shrink: 0;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #ede4db;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
            color: #6b5e58;
            transition: all var(--transition);
        }
        .option-btn.selected .option-letter {
            background: var(--accent);
            color: #fff;
            animation: popLetter 0.3s ease;
        }
        @keyframes popLetter {
            0% { transform: scale(1); }
            40% { transform: scale(1.25); }
            100% { transform: scale(1); }
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 13px 28px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            border: none;
            transition: all var(--transition);
            font-family: var(--font-stack);
            letter-spacing: 0.02em;
        }
        .btn-primary {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 4px 14px rgba(232, 129, 59, 0.3);
        }
        .btn-primary:hover {
            background: #d47430;
            box-shadow: 0 6px 20px rgba(232, 129, 59, 0.4);
            transform: translateY(-1px);
        }
        .btn-primary:disabled {
            background: #c9bdb0;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }
        .btn-outline {
            background: transparent;
            border: 2px solid #d4c8bb;
            color: #6b5e58;
        }
        .btn-outline:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
        .btn-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .result-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 32px 24px;
            box-shadow: var(--shadow);
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 16px;
            animation: fadeInUp 0.5s ease;
            border: 1px solid rgba(0,0,0,0.02);
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .result-emoji {
            font-size: 72px;
            display: block;
            animation: float 2.5s ease-in-out infinite;
        }
        .result-type-name {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 0.03em;
        }
        .result-tagline {
            font-size: 0.9rem;
            color: var(--text-light);
            font-style: italic;
        }
        .result-divider {
            width: 48px;
            height: 3px;
            border-radius: 3px;
            margin: 0 auto;
        }
        .result-desc {
            text-align: left;
            font-size: 0.95rem;
            line-height: 1.7;
            color: #4a3f3a;
            background: #fefcf9;
            border-radius: var(--radius-sm);
            padding: 16px 18px;
        }
        .result-desc p {
            margin-bottom: 8px;
        }
        .result-desc p:last-child {
            margin-bottom: 0;
        }
        .result-badge {
            display: inline-block;
            background: var(--accent-soft);
            color: var(--accent);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.04em;
        }
        .result-extra {
            font-size: 0.85rem;
            color: var(--text-light);
            background: #fefcf9;
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            text-align: left;
            border-left: 3px solid var(--accent);
        }
        .multi-result {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .multi-result .result-card {
            padding: 24px 20px;
        }
        .hidden {
            display: none !important;
        }
        /* 错误弹窗样式 */
        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .popup-card {
            background: #fff;
            border-radius: 24px;
            padding: 40px 32px;
            max-width: 320px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.25);
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .popup-text {
            font-size: 2.2rem;
            font-weight: 800;
            color: #d44;
            margin-bottom: 24px;
            line-height: 1.3;
        }
        .popup-btn {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 30px;
            padding: 14px 32px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s ease;
            width: 100%;
        }
        .popup-btn:hover {
            background: #d47430;
        }
        @media (max-width: 420px) {
            .header h1 { font-size: 1.4rem; }
            .card { padding: 20px 16px; gap: 14px; }
            .question-text { font-size: 1rem; }
            .option-btn { padding: 12px 14px; font-size: 0.9rem; gap: 10px; }
            .option-letter { width: 28px; height: 28px; font-size: 0.75rem; }
            .result-emoji { font-size: 56px; }
            .result-type-name { font-size: 1.3rem; }
            .btn { padding: 12px 22px; font-size: 0.9rem; }
            .lang-switch { padding: 4px 10px; font-size: 0.7rem; }
            .popup-text { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <button class="lang-switch" id="langSwitch" onclick="toggleLanguage()">
                <span>🌐</span> <span id="langLabel">EN</span>
            </button>
            <span class="brand-icon">🌏🎭</span>
            <h1 id="mainTitle">东西即兴人格测试</h1>
            <p class="subtitle" id="mainSubtitle">15道题，找到你在即兴宇宙里的专属角色</p>
        </div>
        <div class="progress-wrap hidden" id="progressWrap">
            <div class="progress-bar-outer">
                <div class="progress-bar-inner" id="progressBar" style="width: 0%;"></div>
            </div>
            <span class="progress-label" id="progressLabel">0/15</span>
        </div>
        <div id="contentArea"></div>
    </div>
    <script>
        (function() {
            let currentLang = 'zh';

            // 题目数据
            const quizData = {
                zh: [
                    { section: '第一部分：舞台上的本能', question: '在即兴游戏开始时，你脑子里第一个念头通常是？', options: [
                        { letter: 'A', text: '我要看看队友想干嘛，全力配合他/她。' },
                        { letter: 'B', text: '我要用身体做一个很有趣、很奇怪的姿势。' },
                        { letter: 'C', text: '我听到了一个特别的词，想把它变成一个有趣的世界观。' },
                        { letter: 'D', text: '我想观察台下观众的表情，找一个能逗笑他们的点。' }
                    ]},
                    { section: '第一部分：舞台上的本能', question: '当一个场景突然冷场，空气突然安静时，你会？', options: [
                        { letter: 'A', text: '享受这几秒沉默，觉得情绪流动比硬填词更重要。' },
                        { letter: 'B', text: '走上去做一个具体的家务动作（比如切菜、扫地），用行动打破尴尬。' },
                        { letter: 'C', text: '突然说一句看似无关但很诗意的话，比如“外面的雨好像停了”。' },
                        { letter: 'D', text: '拍拍队友肩膀，对他/她做一个鬼脸，把压力变成玩笑。' }
                    ]},
                    { section: '第一部分：舞台上的本能', question: '对于舞台上的“犯错”或“口误”，你的态度是？', options: [
                        { letter: 'A', text: '那是礼物。顺着错误走下去往往能开出最意想不到的花。' },
                        { letter: 'B', text: '立刻承认并放大它，把失误变成角色的标签。' },
                        { letter: 'C', text: '大脑飞速运转，试图在逻辑上给这个失误找一个合理的解释。' },
                        { letter: 'D', text: '看观众反应，如果他们笑了，那就重复再做一次！' }
                    ]},
                    { section: '第二部分：创作与表达的习惯', question: '如果要你讲一个故事，你更擅长描述？', options: [
                        { letter: 'A', text: '人与人之间细腻的、难以言说的情感纠葛。' },
                        { letter: 'B', text: '一个有着奇怪癖好的小人物的一天。' },
                        { letter: 'C', text: '一个发生在遥远星系或魔法国度的架空设定。' },
                        { letter: 'D', text: '一个大家都经历过的生活囧事，然后把它讲得活灵活现。' }
                    ]},
                    { section: '第二部分：创作与表达的习惯', question: '在跨文化的即兴环境中（比如有外国队友），你会怎么做？', options: [
                        { letter: 'A', text: '更多地用眼神和肢体去感知对方，语言不通反而觉得更有趣。' },
                        { letter: 'B', text: '刻意放慢语速，用更夸张、视觉化的肢体语言来跨越障碍。' },
                        { letter: 'C', text: '很好奇对方的母语会怎么表达，甚至想学一两句他们的语言塞进戏里。' },
                        { letter: 'D', text: '试图找一个大家文化里共通的槽点来建立连接。' }
                    ]},
                    { section: '第二部分：创作与表达的习惯', question: '你最受不了剧本或电影里的哪种桥段？', options: [
                        { letter: 'A', text: '明明眼神就能交代的情绪，非要靠大段独白说出来。' },
                        { letter: 'B', text: '所有人都是正常人，没有一点怪癖，生活得像样板间。' },
                        { letter: 'C', text: '剧情逻辑有硬伤，看得人一头问号。' },
                        { letter: 'D', text: '强行煽情或者强行说教，不给人留白思考的余地。' }
                    ]},
                    { section: '第三部分：社群生活的底色', question: '在东西即兴的线下Jam结束后，你通常会？', options: [
                        { letter: 'A', text: '找刚才在台上和你有强烈化学反应的人，单独聊几句刚才的某个瞬间。' },
                        { letter: 'B', text: '帮大家收拾椅子、整理场地，或者招呼大家一起去吃宵夜。' },
                        { letter: 'C', text: '找一个安静的角落，在手机备忘录里记下今晚触动到你的灵感。' },
                        { letter: 'D', text: '成为合照里最搞怪、笑得最开心的那一个。' }
                    ]},
                    { section: '第三部分：社群生活的底色', question: '如果社群需要你帮忙，你最愿意贡献哪种技能？', options: [
                        { letter: 'A', text: '帮大家做即兴翻译，或者协助沟通外国老师和同学。' },
                        { letter: 'B', text: '体力活没问题，或者负责买水、准备道具。' },
                        { letter: 'C', text: '写文案、编段子、设计海报或者给演出起名字。' },
                        { letter: 'D', text: '负责热场子，带动气氛，让新来的朋友不感到拘束。' }
                    ]},
                    { section: '第三部分：社群生活的底色', question: '你如何看待社群里的“冲突”或“不同意见”？', options: [
                        { letter: 'A', text: '这是高语境文化和低语境文化的正常碰撞，说出来就好了。' },
                        { letter: 'B', text: '其实只要一起吃顿饭，大家就会发现对方都是可爱的人。' },
                        { letter: 'C', text: '我会试图分析冲突背后的逻辑差异，然后写一篇小作文发在群里。' },
                        { letter: 'D', text: '打个哈哈，用一个即兴游戏让大家把这事儿翻篇。' }
                    ]},
                    { section: '第三部分：社群生活的底色', question: '东西即兴每周四晚上的即兴活动在上海的哪条路？', options: [
                        { letter: 'A', text: '新华路' },
                        { letter: 'B', text: '旧华路' }
                    ]},
                    { section: '第四部分：看待世界的方式', question: '给你一个词“边界”，你第一反应是？', options: [
                        { letter: 'A', text: '是用来跨越和试探的，戏剧冲突往往就在边界线上。' },
                        { letter: 'B', text: '是用来打破的。即兴就是要做生活里不敢做的事。' },
                        { letter: 'C', text: '是一个有趣的命题，可以写一篇探讨社会规训的独角戏。' },
                        { letter: 'D', text: '是安全感。好的即兴是在有边界的安全网里尽情跳跃。' }
                    ]},
                    { section: '第四部分：看待世界的方式', question: '你觉得“东西即兴”这个社群的灵魂是什么？', options: [
                        { letter: 'A', text: '对不同文化背景的尊重与好奇，能在差异中找到共鸣。' },
                        { letter: 'B', text: '允许任何人做任何奇怪的事情，在这里怪胎就是正常人。' },
                        { letter: 'C', text: '一种智性上的快乐，用即兴解构生活里的一切。' },
                        { letter: 'D', text: '是一群不需要太多解释就能玩到一起的伙伴。' }
                    ]},
                    { section: '第五部分：终极选择', question: '演出即将开始，但你发现道具少了一件关键的，你会？', options: [
                        { letter: 'A', text: '太好了，不用被道具束缚了，我们用无实物表演来创造它。' },
                        { letter: 'B', text: '扫视全场，看看有什么别的能替代，甚至替代品比原版更好笑。' },
                        { letter: 'C', text: '即兴修改开场词，把道具消失变成剧情的一部分。' },
                        { letter: 'D', text: '问现场观众借，借不到的话就借这个互动本身当个梗。' }
                    ]},
                    { section: '第五部分：终极选择', question: '如果有人评价你的即兴表演“太过于自我”，你会？', options: [
                        { letter: 'A', text: '反思自己是不是没接住队友给的信号，下次要多听。' },
                        { letter: 'B', text: '思考是不是自己的肢体或者角色太抢戏了，但保留那个奇怪的闪光点。' },
                        { letter: 'C', text: '“自我”是因为我有强烈的表达欲，也许我只是需要一个更懂我的队友。' },
                        { letter: 'D', text: '开玩笑地回他：“因为刚才那一秒，场上只有我配得上那个时刻！”' }
                    ]},
                    { section: '第五部分：终极选择', question: '你希望即兴带给你未来生活最大的改变是？', options: [
                        { letter: 'A', text: '成为一个更能读懂空气、更敏锐的“人类观察家”。' },
                        { letter: 'B', text: '在不确定的生活里，拥有随时说“Yes, and”的勇气。' },
                        { letter: 'C', text: '为我自己的文学/影视创作，找到源源不断的真实素材。' },
                        { letter: 'D', text: '在上海这座昂贵的城市里，找到一群可以一起傻笑的家人。' }
                    ]}
                ],

            function updateProgressUI() {

                currentQuestionIndex = 0;

                selectedLetter = null;
                progressWrap.classList.remove('hidden');

                renderQuestion();

            function renderQuestion() {
                const q = getQuizData()[currentQuestionIndex];
                selectedLetter = null;
                contentArea.innerHTML = `
                <div class="card" id="questionCard">
                  <span class="section-tag">${q.section}</span>
                  <p class="question-text">${currentQuestionIndex + 1}. ${q.question}</p>
                  <div class="options-list">
                    ${q.options.map(opt => `
                      <button class="option-btn" data-letter="${opt.letter}" onclick="selectOption('${opt.letter}', this)">

                    </div>
                `;
                document.body.appendChild(overlay);
                document.getElementById('closePopupBtn').addEventListener('click', () => {
                    overlay.remove();
                });
            }

            function selectOption(letter, btnEl) {
                // 第10题（索引9）选B只是玩笑，不记录答案，弹出弹窗
                if (currentQuestionIndex === 9 && letter === 'B') {
                    showWrongAnswerPopup();
                    return;
                }
                document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
                btnEl.classList.add('selected');
                selectedLetter = letter;
                const nextBtn = document.getElementById('nextBtn');
                if (nextBtn) nextBtn.disabled = false;
            }

            function nextQuestion() {
                if (!selectedLetter) return;
                // 第10题（索引9）不会走到这里，因为选B被拦截；选A正常记录
                answers[currentQuestionIndex] = selectedLetter;
                selectedLetter = null;

                    currentQuestionIndex++;
                    updateProgressUI();
                    renderQuestion();
                    setTimeout(() => {
                        document.getElementById('questionCard')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }, 50);
                } else {
                    showResult();
                }
            }

            function prevQuestion() {
                if (currentQuestionIndex > 0) {
                    if (selectedLetter) answers[currentQuestionIndex] = selectedLetter;
                    currentQuestionIndex--;
                    selectedLetter = null;
                    updateProgressUI();
                    renderQuestion();
                    if (answers[currentQuestionIndex]) {
                        const prevLetter = answers[currentQuestionIndex];
                        setTimeout(() => {
                            const btns = document.querySelectorAll('.option-btn');
                            btns.forEach(b => {
                                if (b.dataset.letter === prevLetter) {
                                    b.classList.add('selected');
                                    selectedLetter = prevLetter;
                                    const nextBtn = document.getElementById('nextBtn');
                                    if (nextBtn) nextBtn.disabled = false;
                                }
                            });
                        }, 60);
                    }
                    setTimeout(() => {
                        document.getElementById('questionCard')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }, 50);
                }

                progressWrap.classList.add('hidden');

                const topTypes = Object.keys(counts).filter(k => counts[k] === maxCount);

                if (topTypes.length === 1) {
                    const type = topTypes[0];
                    const def = getResultDef(type);
                    const color = resultDefs[type].color;

                    </div>
                  `;
                } else {

                        <span class="result-emoji">${emoji}</span>
                        <div class="result-badge">${def.badge}</div>
                        <h2 class="result-type-name" style="color:${color};">${def.typeName}</h2>

                    <div class="multi-result">${cardsHTML}</div>
                    <div style="text-align:center;font-size:0.8rem;color:#9b8e84;margin-top:12px;">${getText('scoreDist')}：A=${counts.A} · B=${counts.B} · C=${counts.C} · D=${counts.D}</div>
                    <button class="btn btn-primary" onclick="restartQuiz()" style="display:block;margin:16px auto 0;">${getText('restartBtn')}</button>
                  `;
                }
                setTimeout(() => {
                    const card = contentArea.querySelector('.result-card');
                    if (card) card.scrollIntoView({ behavior: 'smooth', block: 'start' });

                langLabel.textContent = currentLang === 'zh' ? 'EN' : '中';
                mainTitle.textContent = getText('mainTitle');
                mainSubtitle.textContent = getText('mainSubtitle');
                const isResult = contentArea.querySelector('.result-card') || contentArea.querySelector('.multi-result');
                if (isResult) {
                    showResult();
                } else if (progressWrap.classList.contains('hidden')) {
                    renderStart();
                } else {
                    updateProgressUI();
                    renderQuestion();
                    if (answers[currentQuestionIndex]) {
                        const prevLetter = answers[currentQuestionIndex];
                        setTimeout(() => {
                            const btns = document.querySelectorAll('.option-btn');
                            btns.forEach(b => {
                                if (b.dataset.letter === prevLetter) {
                                    b.classList.add('selected');
                                    selectedLetter = prevLetter;
                                    const nextBtn = document.getElementById('nextBtn');
                                    if (nextBtn) nextBtn.disabled = false;
                                }
                            });
                        }, 60);
                    }
                }
            }

            window.startQuiz = startQuiz;
            window.selectOption = selectOption;
            window.nextQuestion = nextQuestion;
            window.prevQuestion = prevQuestion;
            window.restartQuiz = restartQuiz;
            window.toggleLanguage = toggleLanguage;

            renderStart();
        })();
    </script>
</body>
</html>
